name: 'test'
on: 
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v6
       - name: Setup node
         uses: actions/setup-node@v6
         with:
            node-version: 24.x
       - name: Install dependencies
         run: |
                  npm ci
                  npm ls
       - name: Validate dist
         run: |
              npm i -g rollup
              cp dist/index.js index_pr.js
              rm -rf out dist
              npm run build
              npm run package
              diff dist/index.js index_pr.js
